name: Cloud Cover Pipeline

on:
  workflow_dispatch:                    # Manual trigger from GitHub UI
  schedule:
    - cron: "30 0 * * *"               # Runs daily at 00:30 UTC = 06:00 IST

permissions:
  contents: write                       # Allows pipeline to commit COG files

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install GDAL
      run: |
        sudo apt-get update
        sudo apt-get install -y gdal-bin python3-gdal python3-pip

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directories
      run: |
        mkdir -p data/raw_grib
        mkdir -p data/geotiff
        mkdir -p data/cog

    - name: Run cloud cover pipeline
      run: |
        python scripts/03_run_pipeline.py

    - name: Commit COG files and manifest
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add data/cog/
        git add data/manifest.json

        git status
        git diff --cached --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d') 00z cycle"

        git pull --rebase
        git push
